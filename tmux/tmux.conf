setw -g mouse on
set -g pane-border-lines heavy
set -g pane-border-indicators colour
set -g pane-border-status top
set -g pane-border-format "#P"

# plugins
set -g @plugin 'tmux-plugins/tpm'
source ~/.local/share/nvim/lazy/tokyonight.nvim/extras/tmux/tokyonight_moon.tmux

# Round separators (override moon theme defaults)
set -g status-left "#[fg=#1b1d2b,bg=#82aaff,bold] #S #[fg=#82aaff,bg=#1e2030,nobold,nounderscore,noitalics]"
setw -g window-status-format "#[fg=#1e2030,bg=#1e2030] #[fg=#1e2030,bg=#ffc777,nounderscore,noitalics,bold] #I #[fg=#ffc777,bg=#2d3f76,nobold] #[fg=#636da6,bg=#2d3f76,nounderscore,noitalics] #W #F#[fg=#2d3f76,bg=#1e2030]"
setw -g window-status-current-format "#[fg=#1e2030,bg=#1e2030] #[fg=#1e2030,bg=#c3e88d,bold] #I #[fg=#c3e88d,bg=#3b4261,nobold] #[fg=#82aaff,bg=#3b4261,bold] #W #F #[fg=#3b4261,bg=#1e2030]"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#828bb8,bg=#1e2030,nounderscore"
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'

setw -g mode-keys vi

unbind-key C-b
set -g prefix C-a
bind-key C-a send-prefix

unbind [
bind Escape copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind P paste-buffer

bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"
bind | split-window -h
bind - split-window -v
# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind-key -T prefix l send-keys -R C-l \; clear-history
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind N switch-client -l

set -g default-terminal "screen-256color"
set -g allow-passthrough on
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-strategy-nvim 'session'
set -g status-interval 5
set -s escape-time 0
set -g base-index 1
set -g status-position bottom
setw -g pane-base-index 1
setw -g monitor-activity on
set -g visual-activity on
setw -g mouse on
set-option -g focus-events on
bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt
set -g detach-on-destroy off  # don't exit from tmux when closing a session
set -g renumber-windows on   # renumber all windows when any window is closed
set -g history-limit 1000000 # increase history size (from 2,000)

bind-key "T" run-shell "sesh connect \"$(
	sesh list | fzf-tmux -p 55%,60% \
		--no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
		--header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
		--bind 'tab:down,btab:up' \
		--bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list)' \
		--bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t)' \
		--bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c)' \
		--bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z)' \
		--bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
		--bind 'ctrl-d:execute(tmux kill-session -t {})+change-prompt(⚡  )+reload(sesh list)'
)\""

run '~/.tmux/plugins/tpm/tpm'

# set -g status-style 'bg=#272727' # set to gruvbox background
set-option -g status-right "#[fg=#3b4261,bg=#1e2030]#[fg=#828bb8,bg=#3b4261] CPU #(~/.config/tmux/plugins/tmux-cpu/scripts/cpu_percentage.sh)  RAM #(~/.config/tmux/plugins/tmux-cpu/scripts/ram_percentage.sh) #[fg=#82aaff,bg=#3b4261]#[fg=#1b1d2b,bg=#82aaff,bold] %a %d %b  %H:%M "

